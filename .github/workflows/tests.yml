name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile Python files
        run: |
          python -m py_compile api_clients.py extractor.py main.py models.py protocol.py snowballing.py scisieve/__init__.py scisieve/__main__.py scisieve/cli.py scisieve/common.py scisieve/config.py scisieve/pipeline.py scripts/compute_kappa.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v
