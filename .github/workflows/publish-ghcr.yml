name: Publish GHCR Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, for example v1.0.2"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "checkout_ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          VERSION_TAG="${{ steps.ref.outputs.version_tag }}"
          VERSION_NO_V="${VERSION_TAG#v}"
          {
            echo "image=ghcr.io/${{ github.repository_owner }}/scisieve"
            echo "version_tag=${VERSION_TAG}"
            echo "version_no_v=${VERSION_NO_V}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version_no_v }}
          labels: |
            org.opencontainers.image.title=SciSieve
            org.opencontainers.image.description=Configurable pipeline for automated SLR/MLR construction
            org.opencontainers.image.version=${{ steps.tags.outputs.version_no_v }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
