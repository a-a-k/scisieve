version: 1
topic: cloud_resilience_dependability
description: >
  Query packs for CSUR-grade retrieval of model-based resilience estimation
  in cloud-first distributed systems. Packs are executed independently and
  merged with full provenance and marginal-yield reporting.
packs:
  - id: pack_backbone_cloud_resilience
    enabled: true
    intent: broad high-recall backbone
    query: >
      (resilien* OR dependab* OR "fault toleran*" OR "self-heal*" OR
      reliability OR survivability OR recover*)
      AND
      ("cloud computing" OR "cloud infrastructure" OR "cloud service" OR
      "cloud-native" OR microservice* OR kubernetes OR k8s OR serverless OR
      "multi-cloud" OR "hybrid cloud" OR "container orchestration")
    filters:
      publication_year_from: 2010
      types: [article, proceedings-article]
  - id: pack_analytics_dependability
    enabled: true
    intent: analytical models
    query: >
      ((availability OR dependability OR reliability OR survivability)
       AND (model* OR markov OR queueing OR "stochastic petri net*" OR
       "bayesian network*" OR "probabilistic model checking" OR PRISM))
      AND
      ("cloud" OR microservice* OR kubernetes OR "cloud-native")
  - id: pack_simulation_digital_twin
    enabled: true
    intent: simulation and digital twins
    query: >
      (simulation OR simulator OR cloudsim OR "digital twin" OR "digital twins" OR
       emulation OR "what-if analysis" OR "scenario-based")
      AND
      (resilien* OR dependab* OR reliability OR "fault injection" OR chaos OR
       "resilience assessment" OR "availability-aware")
      AND
      ("cloud" OR microservice* OR kubernetes OR "edge-cloud")
  - id: pack_chaos_fault_injection
    enabled: true
    intent: chaos and fault injection
    query: >
      ("chaos engineering" OR "fault injection" OR "failure injection" OR
      perturbation OR "resilience testing")
      AND
      ("cloud" OR microservice* OR kubernetes OR "cloud-native")
  - id: pack_chaos_foundations
    enabled: true
    intent: foundational chaos engineering and resilience assessment
    query: >
      ("chaos engineering" OR "chaos testing")
      AND
      (resilien* OR reliability OR dependab* OR "IT services" OR
       microservice* OR cloud OR kubernetes)
    filters:
      publication_year_from: 2015
  - id: pack_ml_aiops
    enabled: true
    intent: ML and AIOps
    query: >
      ("AIOps" OR "machine learning" OR "deep learning" OR
       "reinforcement learning" OR diagnosis OR prediction OR
       anomaly OR "root cause")
      AND
      (failure OR outage OR incident OR resilien* OR reliability OR dependab*)
      AND
      ("cloud" OR microservice* OR kubernetes OR serverless)
  - id: pack_formal_methods
    enabled: true
    intent: formal methods
    query: >
      ("formal verification" OR "model checking" OR theorem OR temporal OR
       "probabilistic model checking")
      AND
      (resilien* OR reliability OR availability OR dependab*)
      AND
      ("cloud" OR microservice* OR kubernetes OR autoscaling)
  - id: pack_microservice_resilience
    enabled: true
    intent: microservice resilience modeling, profiling, and diagnosis
    query: >
      (microservice* OR "service mesh" OR "distributed tracing")
      AND
      (resilien* OR reliability OR dependab* OR "fault diagnosis" OR
       "fault injection" OR "resilience profiling" OR "resiliency patterns" OR
       degradation)
  - id: pack_microservice_simulation_tooling
    enabled: true
    intent: simulators and assessment tooling for microservice resilience
    query: >
      (microservice* OR "microservice-based")
      AND
      (simulation OR simulator OR "resilience assessment" OR cloudsim OR MiSim)
      AND
      (resilien* OR reliability OR availability)
  - id: pack_openstack_availability
    enabled: true
    intent: OpenStack and cloud-platform availability modeling
    query: >
      (openstack OR eucalyptus)
      AND
      (availability OR dependab* OR reliability OR resilien* OR replication OR
       failover)
  - id: pack_proactive_failure_risk
    enabled: true
    intent: proactive failure-risk prediction for cloud reliability
    query: >
      ("failure risk" OR "failure prediction" OR "proactive actions" OR
       "incident prediction")
      AND
      (cloud OR "cloud service" OR "cloud computing" OR microservice* OR
       kubernetes)
      AND
      (reliability OR dependab* OR resilien* OR efficiency)
  - id: pack_digital_twin_resilience_exact
    enabled: true
    intent: digital twin resilience and chaos assessment
    query: >
      ("digital twin" OR "digital twins")
      AND
      (resilien* OR reliability OR dependab* OR "chaos engineering" OR
       "fault injection" OR "resilience assessment" OR microservice* OR
       "IT services" OR "edge and cloud")
  - id: pack_fault_tolerance_testing_frameworks
    enabled: true
    intent: testing frameworks for microservice fault tolerance
    query: >
      ("fault tolerance testing" OR "testing framework" OR "reliability testing")
      AND
      (microservice* OR "microservice-based" OR "cloud application" OR
       "cloud applications")
      AND
      (fault tolerance OR resilien* OR reliability)
  - id: pack_kubernetes_control_plane
    enabled: true
    intent: Kubernetes control-plane and orchestrator failure modes
    query: >
      (kubernetes OR k8s OR etcd OR scheduler OR "api server" OR "control plane")
      AND
      (failure OR outage OR resilien* OR reliability OR dependab* OR chaos)
  - id: pack_kubernetes_failure_modes
    enabled: true
    intent: targeted Kubernetes failure-mode retrieval
    query: >
      (kubernetes OR k8s OR etcd OR scheduler OR "api server" OR
       "control plane")
      AND
      ("how does kubernetes fail" OR failure OR outage OR disruption OR
       resilien* OR dependab* OR "fault-tolerant")
  - id: pack_dr_failover
    enabled: true
    intent: DR/failover and multi-region recovery
    query: >
      ("disaster recovery" OR failover OR switchover OR RPO OR RTO OR
      "multi-region" OR "availability zone" OR "cross-region")
      AND
      ("cloud" OR "cloud-native" OR microservice* OR kubernetes)
  - id: pack_cloud_resilience_surveys
    enabled: true
    intent: cloud resilience survey and backbone recall
    query: >
      (survey OR review)
      AND
      ("cloud computing" OR "cloud infrastructure" OR "cloud service")
      AND
      (resilien* OR dependab* OR reliability OR survivability)
  - id: pack_review_discovery
    enabled: true
    intent: tertiary discovery and anchor expansion
    query: >
      (survey OR review OR "systematic literature review" OR "mapping study" OR
      "multivocal literature review")
      AND
      (resilien* OR reliability OR dependab* OR chaos OR "fault injection" OR AIOps)
      AND
      ("cloud" OR microservice* OR kubernetes OR serverless)
  - id: pack_review_aiops_failure_management
    enabled: true
    intent: surveys and reviews on AIOps-based failure management
    query: >
      (survey OR review OR "systematic literature review" OR "mapping study")
      AND
      (AIOps OR "artificial intelligence for IT operations" OR
       "failure management" OR incident OR outage OR diagnosis)
      AND
      (cloud OR microservice* OR "site reliability" OR "IT operations")
  - id: pack_review_fault_injection_microservices
    enabled: true
    intent: reviews on fault injection and chaos in microservices
    query: >
      (survey OR review OR "systematic literature review" OR "mapping study" OR
       "multivocal literature review")
      AND
      ("fault injection" OR "chaos engineering")
      AND
      (microservice* OR "cloud-native" OR kubernetes)
negative_exclusions:
  - "cloud model"
  - "container transportation"
  - "container terminal"
  - "port-hinterland"
  - "urban flood"
  - "stormwater"
  - "vehicle-road-cloud"
  - "blockchain"
  - "wind turbine"
  - "internet of medical things"
  - "healthcare things"
  - "logistics"
