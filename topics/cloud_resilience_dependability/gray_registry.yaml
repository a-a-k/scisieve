      - architecture-guidance
      - service-doc
      - fault-injection-doc
      - reliability-pattern
    query_families:
      - reliability-guidance
      - chaos-procedure
      - failover-guidance
    seed_urls:
      - url: https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/welcome.html
        organization: AWS
        artifact_type: architecture-guidance
