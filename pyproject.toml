[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scicrawl"
version = "1.1.0"
description = "Config-driven CSUR-grade automated SLR/MLR pipeline for cloud resilience and dependability."
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.6.0",
  "pymupdf>=1.24.0",
  "PyYAML>=6.0",
]

[project.scripts]
scicrawl = "scicrawl.cli:main"

[tool.setuptools]
packages = ["scicrawl"]

